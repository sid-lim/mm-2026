<!DOCTYPE html>
<html>
  <head>
    <script>
      const l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/mm-2026/?p=' + encodeURIComponent(l.pathname.slice('/mm-2026'.length) + l.search) +
        l.hash
      );
    </script>
  </head>
</html>
